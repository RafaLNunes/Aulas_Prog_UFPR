<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoorsSecurety</title>

    <link rel="stylesheet" href="./CSS/reset.css">
    <link rel="stylesheet" href="./CSS/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>

<body>
    <header>
        <i class="Logo_Project"></i>
        <div class="Title_Box">
            <h1 class="Titulo_Pag">Doors security management</h1>
            <h3 class="Sub_Titulo">Feito por: Rafael Lemos Nunes</h3>
        </div>
        <div class="User_Info">
            <h1 class="UserName"></h1>
            <button class="UserChoise">Escolher Usuário</button>
        </div>
    </header>
    <main>
        <Section class="Area_Loop">
            <div class="Log_Info_Area">
                <section class="Log_Individual">
                    <div class="Log_In_Horario_inicial">
                        <p class="Intro_Log_In_Tempo">Hórario de Abertura: </p>
                        <p class="tempo_Log" id="Hora_Log_Init"></p>
                        <p class="Separador_Tempo_Log_In">:</p>
                        <p class="tempo_Log" id="Min_Log_Init"></p>
                        <p class="Separador_Tempo_Log_In">:</p>
                        <p class="tempo_Log" id="Seg_Log_Init"></p>
                    </div>
                    <div class="Log_In_AreaCod">
                        <!-- fa-solid fa-n -->
                        <i class="Cod_Seq Cod_Seq1"></i>
                        <i class="Cod_Seq Cod_Seq2"></i>
                        <i class="Cod_Seq Cod_Seq3"></i>
                        <i class="Cod_Seq Cod_Seq4"></i>
                        <i class="Cod_Seq Cod_Seq5"></i>
                    </div>
                    <div class="Log_In_AreaPalavraMestra">
                        <!-- Deixar em Linha -->
                        <p class="Intro_Palavras">Palavra Mestra:</p>
                        <!-- Ou P1 ou P2 terá um espaço no começo ou no fim -->
                        <p class="Palavra_Part1">a</p>
                        <p class="Palavra_Part2">b</p>
                    </div>
                    <div class="Log_In_AreaStatus">
                        <!-- <i class="fa-regular fa-circle-check"></i> -->
                        <!-- <i class="fa-regular fa-circle-xmark"></i> -->
                        <i class="StatusLog"></i>
                        <p class="StatusLog"></p>
                    </div>
                    <div class="Log_In_Horario_inicial">
                        <p class="Intro_Log_In_Tempo">Hórario de Abertura: </p>
                        <p class="tempo_Log" id="Hora_Log_Exit"></p>
                        <p class="Separador_Tempo_Log_In">:</p>
                        <p class="tempo_Log" id="Min_Log_Exit"></p>
                        <p class="Separador_Tempo_Log_In">:</p>
                        <p class="tempo_Log" id="Seg_Log_Exit"></p>
                    </div>
                    <hr>
                </section>
            </div>
            <div class="bnt_Area">
                <button class="bnt bnt_CodMestre" id="bnt_CodMestre">Gerar Codigo Mestre</button>
            </div>
        </Section>
    </main>
    <footer>
        <section class="Conex_Info">
            <div class="Esp_Conex">
                <i class="Logo_Esp fa-solid fa-microchip"></i>
                <p class="Info_Esp_Conex">ESP32</p>
            </div>
            <div class="Status_Conex">
                <i class="Logo_Status fa-solid fa-satellite-dish"></i>
                <p class="Info_Status_Conex"></p>
            </div>
            <div class="DT_Conex">
                <i class="Logo_DT fa-solid fa-database"></i>
                <p class="Info_DT_Conex">SUPABASE</p>
            </div>
        </section>
    </footer>
</body>
<script src="./JS/conex.js"></script>
<script src="./JS/script.js"></script>

</html>
